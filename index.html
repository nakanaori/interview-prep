<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Interview Prep</title>
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify/themes/dark.css" />
  <style>
    :root {
      --theme-color: #58a6ff;
    }
    .sidebar {
      background-color: #0d1117;
    }
    .sidebar-nav ul li a {
      color: #c9d1d9;
    }
    .sidebar-nav ul li a:hover {
      color: #58a6ff;
    }
    nav.app-nav {
      display: none;
    }
    .markdown-section h1,
    .markdown-section h2,
    .markdown-section h3 {
      border-bottom-color: #30363d;
    }
    .markdown-section code {
      background: #161b22;
      color: #e6edf3;
    }
    .markdown-section pre {
      background: #161b22;
    }
    .markdown-section table {
      border-color: #30363d;
    }
    .markdown-section table th {
      background: #161b22;
    }
    input[type="checkbox"] {
      accent-color: #3fb950;
    }
    .sidebar > h1 {
      color: #58a6ff;
    }
  </style>
</head>
<body>
  <div id="app"></div>
  <script>
    window.$docsify = {
      name: '📋 Interview Prep',
      repo: '',
      loadSidebar: true,
      subMaxLevel: 2,
      auto2top: true,
      search: {
        maxAge: 86400000,
        paths: 'auto',
        placeholder: 'Search...',
        noData: 'No results.',
        depth: 3,
      },
      copyCode: {
        buttonText: 'Copy',
        successText: 'Copied!',
      },
    };
  </script>
  <script src="//cdn.jsdelivr.net/npm/docsify/lib/docsify.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify/lib/plugins/search.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify-copy-code/dist/docsify-copy-code.min.js"></script>
</body>
</html>
