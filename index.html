<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Interview Prep</title>
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify-themeable@0/dist/css/theme-simple-dark.css" />
  <style>
    :root {
      /* Accent */
      --theme-color: #58a6ff;

      /* Base */
      --base-background-color: #0d1117;
      --base-color: #e6edf3;
      --base-font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      --base-font-size: 15px;
      --base-line-height: 1.7;

      /* Sidebar */
      --sidebar-background: #0d1117;
      --sidebar-border-color: #21262d;
      --sidebar-border-width: 1px;
      --sidebar-name-color: #e6edf3;
      --sidebar-name-font-weight: 600;
      --sidebar-nav-link-color: #c9d1d9;
      --sidebar-nav-link-color--hover: #58a6ff;
      --sidebar-nav-link-color--active: #58a6ff;
      --sidebar-nav-link-background--active: #161b22;
      --sidebar-nav-link-border-radius--active: 4px;
      --sidebar-nav-link-padding: 3px 8px;
      --sidebar-nav-link-font-weight--active: 600;
      --sidebar-nav-pagelink-color: #8b949e;
      --sidebar-nav-pagelink-font-size: 0.72em;
      --sidebar-nav-pagelink-font-weight: 700;
      --sidebar-nav-pagelink-text-transform: uppercase;
      --sidebar-nav-pagelink-letter-spacing: 0.08em;

      /* Headings */
      --heading-color: #e6edf3;
      --heading-h1-border-color: #21262d;
      --heading-h2-border-color: #21262d;
      --heading-h1-font-size: 1.9em;
      --heading-h2-font-size: 1.4em;
      --heading-h3-font-size: 1.15em;

      /* Links */
      --link-color: #58a6ff;
      --link-color--hover: #79b8ff;
      --link-text-decoration--hover: underline;

      /* Code */
      --code-font-family: ui-monospace, SFMono-Regular, "SF Mono", Menlo, Consolas, monospace;
      --code-font-size: 0.875em;
      --code-background: #161b22;
      --code-inline-background: #161b22;
      --code-inline-color: #e6edf3;
      --code-inline-border-radius: 4px;
      --code-block-border-radius: 6px;

      /* Tables */
      --table-cell-border-color: #30363d;
      --table-head-background: #161b22;
      --table-head-color: #8b949e;
      --table-body-row-odd-background: #0d1117;
      --table-body-row-even-background: #0d1117;
      --table-cell-padding: 8px 14px;

      /* Blockquote */
      --blockquote-border-color: #30363d;
      --blockquote-color: #8b949e;
      --blockquote-background: #161b22;
      --blockquote-padding: 12px 16px;
      --blockquote-border-width: 4px;

      /* Search */
      --search-input-background-color: #161b22;
      --search-input-border-color: #30363d;
      --search-input-color: #e6edf3;
      --search-input-placeholder-color: #6e7681;
      --search-result-heading-color: #58a6ff;
      --search-result-keyword-color: #0d1117;
      --search-result-keyword-background: #58a6ff;

      /* HR */
      --hr-border: 1px solid #21262d;

      /* Cover page */
      --cover-background-color: #0d1117;
    }

    /* Sidebar section labels */
    .sidebar-nav ul > li > strong {
      display: block;
      color: #6e7681;
      font-size: 0.7em;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin: 16px 0 4px 8px;
    }

    /* Table — remove odd/even stripe, add hover */
    .markdown-section table tbody tr:hover {
      background: #161b22;
    }

    /* Inline code inside table cells */
    .markdown-section td code,
    .markdown-section th code {
      background: #21262d;
      color: #e6edf3;
    }

    /* Checkbox accent */
    input[type="checkbox"] {
      accent-color: #3fb950;
    }

    /* Search box top margin fix */
    .search input {
      margin: 0;
    }
  </style>
</head>
<body>
  <div id="app"></div>
  <script>
    window.$docsify = {
      name: '📋 Interview Prep',
      repo: '',
      loadSidebar: true,
      subMaxLevel: 2,
      auto2top: true,
      search: {
        maxAge: 86400000,
        paths: 'auto',
        placeholder: 'Search...',
        noData: 'No results.',
        depth: 3,
      },
      copyCode: {
        buttonText: 'Copy',
        successText: 'Copied!',
      },
    };
  </script>
  <script src="//cdn.jsdelivr.net/npm/docsify/lib/docsify.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify-themeable@0/dist/js/docsify-themeable.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify/lib/plugins/search.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify-copy-code/dist/docsify-copy-code.min.js"></script>
</body>
</html>
